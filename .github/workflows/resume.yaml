name: Resume

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - resume/**

jobs:
  deploy:
    name: Publish Resume
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Compile
      uses: xu-cheng/latex-action@v4
      with:
        root_file: resume.tex
        working_directory: ./resume
        latexmk_use_lualatex: true
    - name: Deploy
      uses: cloudflare/wrangler-action@v3
      with:
        workingDirectory: ./resume
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: r2 object put public/resume.pdf --file=resume.pdf --cache-control "no-cache, no-store"

    - name: Purge CDN cache
      run: |
        curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"files":["https://public.ininicho.com/resume.pdf"]}' | jq .success

