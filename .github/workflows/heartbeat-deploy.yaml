name: Deploy Heartbeat Worker

on:
  push:
    branches:
      - main
    paths:
      - "infra/homelab/cloudflare-worker/heartbeat/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/homelab/cloudflare-worker/heartbeat
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.PI_HEALTH_URL }}" | wrangler secret put PI_HEALTH_URL
          echo "${{ secrets.NTFY_FALLBACK_TOPIC }}" | wrangler secret put NTFY_FALLBACK_TOPIC
          echo "${{ secrets.NTFY_FALLBACK_TOKEN }}" | wrangler secret put NTFY_FALLBACK_TOKEN

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy
