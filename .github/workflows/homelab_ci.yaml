name: Homelab CI

on:
  pull_request:
    paths:
      - "infra/homelab/**"

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint infra/homelab/apps/ infra/homelab/argocd/ infra/homelab/infrastructure/

      - name: Dry-run all manifests
        run: |
          find infra/homelab/apps infra/homelab/argocd infra/homelab/infrastructure \
            -name "*.yaml" \
            ! -name "*.example.yaml" \
            | xargs -I{} kubectl apply --dry-run=client -f {}
