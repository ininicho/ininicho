name: Homelab CI

on:
  pull_request:
    paths:
      - "infra/homelab/**"

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: |
          yamllint infra/homelab/apps/ infra/homelab/argocd/ \
            infra/homelab/infrastructure/storage/ \
            infra/homelab/infrastructure/sealed-secrets/ \
            infra/homelab/infrastructure/kustomization.yaml
