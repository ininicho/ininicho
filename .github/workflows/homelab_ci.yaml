name: Homelab CI

on:
  pull_request:
    paths:
      - "infra/homelab/**"

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint infra/homelab/apps/ infra/homelab/argocd/ \
              infra/homelab/infrastructure/storage/ \
              infra/homelab/infrastructure/sealed-secrets/ \
              infra/homelab/infrastructure/kustomization.yaml

      - name: Create stub kubeconfig for client-side dry-run
        run: |
          kubectl config set-cluster local --server=https://localhost:6443
          kubectl config set-credentials admin --token=stub
          kubectl config set-context local --cluster=local --user=admin
          kubectl config use-context local

      - name: Dry-run all manifests
        run: |
          find infra/homelab/apps infra/homelab/argocd infra/homelab/infrastructure \
            -name "*.yaml" \
            ! -name "*.example.yaml" \
            | xargs -I{} kubectl apply --dry-run=client -f {}
