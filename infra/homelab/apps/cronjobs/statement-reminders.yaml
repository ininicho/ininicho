apiVersion: batch/v1
kind: CronJob
metadata:
  name: reminder-amex
  namespace: command-center
spec:
  schedule: "0 14 13 * *"  # 13th monthly — 3 days after Amex closes on 10th
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: notify
              image: curlimages/curl:latest
              env:
                - name: NTFY_URL
                  value: "http://ntfy.ntfy.svc.cluster.local"
                - name: NTFY_PUBLISH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: command-center-auth
                      key: NTFY_PUBLISH_TOKEN
              command:
                - sh
                - -c
                - |
                  curl -s \
                    -H "Authorization: Bearer $NTFY_PUBLISH_TOKEN" \
                    -H "Title: 💳 Upload Amex Cobalt statement" \
                    -d "Amex Cobalt statement closed on the 10th. Please upload your statement to MinIO." \
                    "$NTFY_URL/alerts"
---
