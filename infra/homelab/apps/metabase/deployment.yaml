apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:latest
          ports:
            - containerPort: 3000
          env:
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              value: postgres.postgres.svc.cluster.local
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: metabase
            - name: MB_DB_USER
              value: postgres
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: metabase-db
                  key: MB_DB_PASS
            - name: MB_PLUGINS_DIR
              value: /metabase-data/plugins
          volumeMounts:
            - name: data
              mountPath: /metabase-data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metabase-data
