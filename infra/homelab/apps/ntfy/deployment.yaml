apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 0
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.11.0
          args: ["serve", "--config", "/etc/ntfy/server.yml"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cache
              mountPath: /var/cache/ntfy
            - name: config
              mountPath: /etc/ntfy
          resources:
            requests:
              memory: "50Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: ntfy-cache
        - name: config
          configMap:
            name: ntfy-config
